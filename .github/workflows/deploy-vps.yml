name: Deploy Web App to VPS

on:
  workflow_dispatch:
    inputs:
      release_manifest:
        description: Optional release-manifest JSON for coordinated cross-repo promotion
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "release-*"
    paths:
      - ".github/workflows/deploy-vps.yml"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "vite.config.ts"
      - "jest.config.cjs"
      - "deploy/**"
      - ".env.production.example"

permissions:
  contents: read

concurrency:
  group: vps-web-production
  cancel-in-progress: true

env:
  REMOTE_PATH: /opt/pm-web

jobs:
  deploy-source-gate:
    name: deploy-source-gate
    runs-on: ubuntu-latest
    outputs:
      deploy_source: ${{ steps.gate.outputs.deploy_source }}
    steps:
      - name: Validate deployment source
        id: gate
        env:
          RELEASE_MANIFEST: ${{ github.event.inputs.release_manifest || '' }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const eventName = process.env.GITHUB_EVENT_NAME;
          const ref = process.env.GITHUB_REF;
          const sha = process.env.GITHUB_SHA;
          const repoName = process.env.REPOSITORY_NAME;
          const manifestText = (process.env.RELEASE_MANIFEST || '').trim();

          let deploySource = null;
          if (ref === 'refs/heads/main') {
            deploySource = 'main';
          } else if (ref.startsWith('refs/tags/release-')) {
            deploySource = 'release-tag';
          } else if (manifestText.length > 0) {
            deploySource = 'release-manifest';
          }

          if (!deploySource) {
            throw new Error(
              `Production deploy is allowed only from main, release-* tags, or a release manifest. Got event=${eventName}, ref=${ref}.`,
            );
          }

          if (deploySource === 'release-manifest') {
            let manifest;
            try {
              manifest = JSON.parse(manifestText);
            } catch (error) {
              throw new Error(`release_manifest is not valid JSON: ${error.message}`);
            }

            const repoEntry = manifest?.repositories?.[repoName];
            if (!repoEntry?.sha) {
              throw new Error(`release_manifest.repositories.${repoName}.sha is required.`);
            }

            if (repoEntry.sha !== sha) {
              throw new Error(
                `release manifest SHA mismatch for ${repoName}: expected ${sha} but got ${repoEntry.sha}.`,
              );
            }
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deploy_source=${deploySource}\n`);
          console.log(`Deployment source accepted: ${deploySource}`);
          NODE

  validate:
    name: validate
    needs: deploy-source-gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy bundle
        run: npm run typecheck && npm run build:bundle

      - name: Upload validated build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

  deploy:
    name: deploy
    needs:
      - deploy-source-gate
      - validate
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download validated build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Backup existing VPS web deployment
        shell: bash
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
          set -euo pipefail
          backup_root=/opt/pm-backups/web
          timestamp=$(date -u +%Y%m%dT%H%M%SZ)
          mkdir -p "$backup_root"

          if [ -d /opt/pm-web ]; then
            tar -czf "$backup_root/pm-web-${timestamp}.tgz" -C /opt pm-web
            echo "Created backup: $backup_root/pm-web-${timestamp}.tgz"
          else
            echo "No existing /opt/pm-web directory found; skipping backup tarball."
          fi

          ls -1t "$backup_root" 2>/dev/null | tail -n +16 | while read -r file; do
            rm -f "$backup_root/$file"
          done
          EOF

      - name: Ensure remote directories exist
        shell: bash
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p ${REMOTE_PATH}/site ${REMOTE_PATH}/deploy"

      - name: Sync static bundle to VPS
        shell: bash
        run: |
          rsync -az --delete ./dist/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${REMOTE_PATH}/site/"

      - name: Upload nginx config
        shell: bash
        run: |
          scp deploy/pm-web.nginx.conf "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${REMOTE_PATH}/deploy/pm-web.nginx.conf"

      - name: Configure nginx on VPS
        shell: bash
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          if ! command -v nginx >/dev/null 2>&1; then
            apt-get update
            apt-get install -y nginx
            systemctl enable nginx
          fi
          cp /opt/pm-web/deploy/pm-web.nginx.conf /etc/nginx/sites-available/pm-web
          ln -sfn /etc/nginx/sites-available/pm-web /etc/nginx/sites-enabled/pm-web
          rm -f /etc/nginx/sites-enabled/default
          nginx -t
          systemctl reload nginx || systemctl restart nginx
          for attempt in $(seq 1 10); do
            if curl --fail --silent http://127.0.0.1/ > /dev/null \
              && curl --fail --silent http://127.0.0.1/health > /dev/null \
              && curl --fail --silent --resolve meco-pm.duckdns.org:443:127.0.0.1 https://meco-pm.duckdns.org/health > /dev/null; then
              echo "Web checks passed."
              exit 0
            fi
            echo "Waiting for nginx routes (${attempt}/10)..."
            sleep 2
          done
          echo "Web checks never passed."
          curl -i http://127.0.0.1/ || true
          echo "---"
          curl -i http://127.0.0.1/health || true
          echo "---"
          curl -i --resolve meco-pm.duckdns.org:443:127.0.0.1 https://meco-pm.duckdns.org/health || true
          echo "---"
          nginx -T || true
          echo "---"
          tail -n 200 /var/log/nginx/error.log || true
          exit 1
          EOF
