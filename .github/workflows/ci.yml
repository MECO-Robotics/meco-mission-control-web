name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - development
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/codex-automerge.yml"
      - ".github/workflows/deploy-vps.yml"
      - "deploy/**"
      - "docs/**"
      - "README.md"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "scripts/organization-audit.mjs"
      - "eslint.config.js"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "vite.config.ts"
      - "jest.config.cjs"
      - ".env.production.example"
  push:
    branches:
      - development
      - main
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/codex-automerge.yml"
      - ".github/workflows/deploy-vps.yml"
      - "deploy/**"
      - "docs/**"
      - "README.md"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "scripts/organization-audit.mjs"
      - "eslint.config.js"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "vite.config.ts"
      - "jest.config.cjs"
      - ".env.production.example"

permissions:
  contents: read

concurrency:
  group: meco-mission-control-web-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-model:
    name: branch-model
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR branch strategy
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          if [[ "$BASE_REF" == "development" ]]; then
            if [[ "$HEAD_REF" =~ ^(feature|fix|hotfix)/ ]]; then
              exit 0
            fi
            echo "PRs into development must come from feature/*, fix/*, or hotfix/* branches." >&2
            exit 1
          fi

          if [[ "$BASE_REF" == "main" ]]; then
            if [[ "$HEAD_REF" == "development" || "$HEAD_REF" =~ ^hotfix/ ]]; then
              exit 0
            fi
            echo "PRs into main must come from development or hotfix/* branches." >&2
            exit 1
          fi

          echo "Unexpected PR base branch: $BASE_REF" >&2
          exit 1

  ci-validate:
    name: ci-validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce organization hard limits
        run: npm run audit:organization:strict

      - name: Verify
        run: npm run verify

  organization-audit:
    name: organization-audit
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run organization audit
        run: npm run audit:organization

      - name: Upload organization audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: organization-audit-${{ github.sha }}
          path: |
            .diagnostics/organization-audit/latest.json
            .diagnostics/organization-audit/latest.md
          if-no-files-found: warn

  snapshot-validate:
    name: snapshot-validate
    needs: ci-validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build:bundle

      - name: Build sanitized production-like snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p snapshot
          node <<'NODE'
          const fs = require('node:fs');

          const payload = {
            repository: process.env.GITHUB_REPOSITORY,
            commit: process.env.GITHUB_SHA,
            ref: process.env.GITHUB_REF,
            generatedAtUtc: new Date().toISOString(),
            validations: ['npm run verify', 'npm run build:bundle'],
            artifacts: ['dist/**', 'deploy/pm-web.nginx.conf', '.env.production.example'],
            deployTarget: 'production-vps',
          };

          fs.writeFileSync('snapshot/manifest.json', `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          tar -czf snapshot/web-production-snapshot.tgz dist deploy/pm-web.nginx.conf .env.production.example package.json package-lock.json snapshot/manifest.json

      - name: Upload sanitized snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-production-snapshot-${{ github.sha }}
          path: |
            snapshot/manifest.json
            snapshot/web-production-snapshot.tgz
          if-no-files-found: error

  cross-repo-production-gate:
    name: cross-repo-production-gate
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs:
      - ci-validate
      - snapshot-validate
    runs-on: ubuntu-latest
    steps:
      - name: Validate development integration health across all repos
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          const owner = 'MECO-Robotics';
          const repos = ['meco-mission-control-web', 'meco-mission-control-platform', 'meco-mission-control-mobile'];
          const requiredChecks = {
            'meco-mission-control-web': ['ci-validate', 'snapshot-validate'],
            'meco-mission-control-platform': ['ci-validate', 'snapshot-validate'],
            'meco-mission-control-mobile': ['ci-validate', 'snapshot-validate'],
          };

          const token = process.env.GH_TOKEN;
          if (!token) {
            throw new Error('github.token is required for cross-repo validation.');
          }

          async function gh(path) {
            const response = await fetch(`https://api.github.com${path}`, {
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
              },
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`GitHub API ${path} failed (${response.status}): ${body}`);
            }

            return response.json();
          }

          function getRunTimestamp(checkRun) {
            return Date.parse(checkRun?.started_at ?? checkRun?.completed_at ?? 0);
          }

          async function getRequiredCheckState(owner, repo, sha, checksToRequire) {
            const checks = await gh(`/repos/${owner}/${repo}/commits/${sha}/check-runs?per_page=100`);
            const latestRunsByCheck = new Map();

            for (const checkRun of checks.check_runs ?? []) {
              if (!checksToRequire.includes(checkRun.name)) {
                continue;
              }

              const previousRun = latestRunsByCheck.get(checkRun.name);
              if (!previousRun || getRunTimestamp(checkRun) >= getRunTimestamp(previousRun)) {
                latestRunsByCheck.set(checkRun.name, checkRun);
              }
            }

            const presentChecks = checksToRequire.filter((checkName) => latestRunsByCheck.has(checkName));
            const missingChecks = checksToRequire.filter((checkName) => !latestRunsByCheck.has(checkName));
            const nonSuccessfulChecks = checksToRequire.filter((checkName) => {
              const checkRun = latestRunsByCheck.get(checkName);
              return checkRun && checkRun.conclusion !== 'success';
            });

            return {
              hasAnyRequiredCheckRun: presentChecks.length > 0,
              hasAllRequiredCheckRuns: missingChecks.length === 0,
              missingChecks,
              nonSuccessfulChecks,
              latestRunsByCheck,
            };
          }

          async function findLatestSuccessfulCheckSha(owner, repo, branchRef, checksToRequire) {
            const branch = await gh(`/repos/${owner}/${repo}/branches/${branchRef}`);
            const headSha = branch?.commit?.sha;
            if (!headSha) {
              throw new Error(`Could not resolve ${branchRef} HEAD SHA for ${owner}/${repo}.`);
            }

            const headCheckState = await getRequiredCheckState(owner, repo, headSha, checksToRequire);
            if (headCheckState.hasAnyRequiredCheckRun) {
              if (!headCheckState.hasAllRequiredCheckRuns) {
                throw new Error(
                  `${owner}/${repo}@${headSha} has partial required checks at ${branchRef} head; missing: ${headCheckState.missingChecks.join(', ')}.`,
                );
              }

              if (headCheckState.nonSuccessfulChecks.length > 0) {
                const failingSummary = headCheckState.nonSuccessfulChecks
                  .map((checkName) => {
                    const checkRun = headCheckState.latestRunsByCheck.get(checkName);
                    const status = checkRun?.status ?? 'unknown';
                    const conclusion = checkRun?.conclusion ?? 'pending';
                    return `${checkName}(${status}/${conclusion})`;
                  })
                  .join(', ');
                throw new Error(
                  `${owner}/${repo}@${headSha} has non-success required checks at ${branchRef} head: ${failingSummary}.`,
                );
              }

              return { headSha, validatedSha: headSha };
            }

            throw new Error(
              `${owner}/${repo}@${headSha} is missing required checks at ${branchRef} head: ${checksToRequire.join(', ')}.`,
            );
          }

          for (const repo of repos) {
            const checksToRequire = requiredChecks[repo];
            const { headSha, validatedSha } = await findLatestSuccessfulCheckSha(
              owner,
              repo,
              'development',
              checksToRequire,
            );
            console.log(
              `Validated ${owner}/${repo}@${validatedSha} (development head ${headSha})`,
            );
          }
          NODE
