name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "deploy/**"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "vite.config.ts"
      - "jest.config.cjs"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "deploy/**"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "vite.config.ts"
      - "jest.config.cjs"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify
